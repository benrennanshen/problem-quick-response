version: '3.8'

services:
  problemquickresponse:
    image: problemquickresponse:latest
    expose:
      - "8004"
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agent-tool-network

networks:
  agent-tool-network:
    external: true

